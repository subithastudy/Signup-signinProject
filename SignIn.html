<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xplore - Sign In</title>
      <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  
  <!-- Linking for password eye icon  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

</head>

<!-- Body starts -->
<body>

    <div class="signin-wrapper">
        <div class="card signin-card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">Xplore Sign In</h2>
                    <button type="button" class="btn-close" id="closeBtn"></button>
                </div>

                <form id="signinForm">

                    <!-- Email Field -->
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com"
                            required>
                        <div id="emailFeedback" class="text-danger small mt-1"></div>
                    </div>

                    <!-- Password Field -->
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="loginPassword" required>
                            <span class="input-group-text password-toggle" style="cursor:pointer">
                                <i class="fa-solid fa-eye"></i>
                            </span>
                        </div>

                        <!-- Password Requirement Hints -->
                        <div id="passLengthHint" class="text-muted small mt-1" style="display:none">
                            The password should have minimum 8 characters and maximum 255 characters.
                        </div>
                        
                        <div id="passFormatFeedback" class="text-danger small mt-1"></div>
                    </div>

                    <div id="loginError" class="alert alert-danger small py-2 text-center" style="display:none"></div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>

                    <!-- Redirecting to Sign Up page if new user -->
                    <p class="text-center mt-3 small">
                        New here? <a href="signup.html" class="text-decoration-none">Create Account</a>
                    </p>

                </form>
            </div>
        </div>
    </div>

    <!-- External CSS -->
    <script src="js/index.js"></script>

</body>
<!-- Body ends -->

</html>
