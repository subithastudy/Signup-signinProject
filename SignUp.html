<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/x-icon" href="./images/logo.jpg">
    <title>Sign Up</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- Body starts -->
<body>

    <div class="wrapper">
        <div class="container wrapper-class">

            <form id="signupForm" class="form-box">

                <div class="heading-box">
                    <h2>Create Account</h2>
                    <button type="button" class="close-btn">&times;</button>
                </div>

                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" required>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" required>
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <label for="city">Location / City</label>
                    <input type="text" id="city" required>
                    <small class="error"></small>
                </div>

                <div class="input-group password-box">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" maxlength="16" required>
                    <span class="toggle-password">👁</span>
                    <small class="error"></small>
                </div>

                <div class="input-group password-box">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" maxlength="16" required>
                    <span class="toggle-password">👁</span>
                    <small class="error"></small>
                </div>

                <button type="submit" id="submit">Sign Up</button>

                <!-- Connecting to Sign In page -->
                <p class="link-text">
                    Already have an account?
                    <a href="signin.html">Sign In</a>
                </p>

            </form>

        </div>
    </div>

    <!-- External CSS -->
    <script src="js/index.js"></script>

</body>
<!-- Body ends -->

</html>
